<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ</title>
  <link rel="stylesheet" href="./assets/style.css">
  <!-- ADSENSE_PLACEHOLDER: ここにAdSenseコードを貼る -->
  <style>
    .contact-form { max-width: 560px; }
    .contact-form label { display:block; font-size:13px; font-weight:bold; margin-bottom:4px; margin-top:14px; }
    .contact-form input, .contact-form textarea {
      width:100%; padding:8px 10px; border:1px solid #bbb;
      font-size:13px; font-family:inherit; outline:none;
    }
    .contact-form input:focus, .contact-form textarea:focus { border-color:#0066cc; }
    .contact-form textarea { height:140px; resize:vertical; }
    .contact-form button {
      margin-top:16px; padding:10px 28px;
      background:#cc0000; color:#fff; border:none;
      font-size:14px; cursor:pointer;
    }
    .contact-form button:hover { background:#a30000; }
    .contact-note { font-size:12px; color:#888; margin-top:10px; }
    .privacy-note {
      margin-top:16px; padding:10px 12px;
      background:#f9f9f9; border:1px solid #eee;
      font-size:12px; color:#888; line-height:1.6;
    }
    .thanks-msg {
      display:none; margin-top:20px; padding:16px;
      background:#e8f5e9; border:1px solid #a5d6a7;
      color:#2e7d32; font-size:14px; border-radius:2px;
    }
    .error-msg {
      display:none; margin-top:20px; padding:16px;
      background:#fff3e0; border:1px solid #ffcc80;
      color:#e65100; font-size:14px; border-radius:2px;
    }
    /* ハニーポット（スパム対策） */
    .hp-field { display:none; }
  </style>
</head>
<body>

<header id="site-header"></header>

<div class="container">
  <main class="main-content">
    <div class="article-detail">
      <h1>お問い合わせ</h1>
      <div class="body" style="margin-top:16px;">
        <p>記事の内容に関するご意見・ご指摘、掲載に関するお問い合わせはこちらからどうぞ。</p>
        <p style="margin-top:8px;color:#888;font-size:12px;">※ 返信にお時間をいただく場合があります。</p>

        <form class="contact-form" id="contact-form" action="mailto:ai.kasegu.lab@gmail.com" method="GET" enctype="text/plain">

          <label for="name">お名前</label>
          <input type="text" id="name" name="お名前" placeholder="例：山田 太郎" required>

          <label for="subject">件名</label>
          <input type="text" id="subject" name="subject" placeholder="例：記事の内容について" required>

          <label for="message">お問い合わせ内容</label>
          <textarea id="message" name="お問い合わせ内容" placeholder="お問い合わせ内容を入力してください" required></textarea>

          <button type="submit" id="submit-btn">メールで送信する</button>
          <p class="contact-note">
            ボタンを押すとメールアプリが開きます。そのまま送信してください。<br>
            メールアプリが開かない場合は <strong>ai.kasegu.lab@gmail.com</strong> へ直接ご連絡ください。
          </p>
        </form>

        <!-- 直接連絡先 -->
        <div class="privacy-note" style="margin-top:12px;">
          直接メールでのお問い合わせも受け付けております：<strong>ai.kasegu.lab@gmail.com</strong>
        </div>

        <!-- プライバシー告知 -->
        <div class="privacy-note">
          お問い合わせ内容は、返信およびサポート対応のみに利用します。第三者への提供は行いません。<br>
          詳細は<a href="./privacy.html">プライバシーポリシー</a>をご確認ください。
        </div>
      </div>
    </div>
  </main>
  <aside class="sidebar" id="sidebar"></aside>
</div>

<footer id="site-footer"></footer>

<script src="./assets/components.js"></script>
<script>
  SITE.init().then(() => SITE.renderSidebar());

  // mailto フォームのためJSによる送信制御は不要
</script>
</body>
</html>
