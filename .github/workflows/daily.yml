name: 毎日自動運用（ニュース取得・X投稿・サイト更新）

on:
  schedule:
    # JST = UTC+9
    - cron: '0 22 * * *'   # 07:00 JST → 朝ツイート＋記事生成
    - cron: '0 3 * * *'    # 12:00 JST → 昼ツイート
    - cron: '0 12 * * *'   # 21:00 JST → 夜ツイート
  workflow_dispatch:        # 手動実行ボタン（テスト用）
    inputs:
      slot:
        description: '実行スロット (morning / noon / evening)'
        required: true
        default: morning

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # articles.json を push するために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージインストール
        run: npm ci

      - name: スロット判定
        id: slot
        run: |
          # workflow_dispatch の場合は入力値を使用
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ inputs.slot }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          # cron の場合は現在時刻（UTC）から判定
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "22" ]; then
            echo "slot=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "03" ]; then
            echo "slot=noon" >> $GITHUB_OUTPUT
          else
            echo "slot=evening" >> $GITHUB_OUTPUT
          fi

      - name: daily-run 実行
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:              ${{ secrets.X_API_KEY }}
          X_API_SECRET:           ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:         ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:  ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          FIXED_HASHTAG:          ${{ secrets.FIXED_HASHTAG }}
        run: node scripts/daily-run.js ${{ steps.slot.outputs.slot }}

      - name: 変更をコミット＆プッシュ（朝のみ）
        if: steps.slot.outputs.slot == 'morning'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/articles.json public/data/post-queue.json public/data/run-log.json
          git diff --cached --quiet || git commit -m "chore: auto update articles $(date +%Y-%m-%d)"
          git push
